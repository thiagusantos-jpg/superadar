name: SuperRadar Daily Scan

on:
  schedule:
    - cron: '30 9 * * *' # 09:30 UTC = 06:30 BRT
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Security checklist - secrets readiness
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENDERECO_LOJA: ${{ secrets.ENDERECO_LOJA }}
          SCAN_TARGETS_JSON: ${{ secrets.SCAN_TARGETS_JSON }}
        run: |
          set -euo pipefail
          required=(
            SUPABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
            TELEGRAM_TOKEN
            TELEGRAM_CHAT_ID
            ENDERECO_LOJA
            SCAN_TARGETS_JSON
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Secret obrigatório ausente: ${key}"
              exit 1
            fi
          done

          if [[ "${SUPABASE_SERVICE_ROLE_KEY}" == *"anon"* ]]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY parece ser anon key. Use somente service_role key no backend."
            exit 1
          fi

          echo "Checklist de segurança de secrets validado."

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run scraper
        run: python -m backend.app.main
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ENDERECO_LOJA: ${{ secrets.ENDERECO_LOJA }}
          SCAN_TARGETS_JSON: ${{ secrets.SCAN_TARGETS_JSON }}

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: superadar-debug-artifacts
          path: |
            prints/
            *.log
          if-no-files-found: ignore
