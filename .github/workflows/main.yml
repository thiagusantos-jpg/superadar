name: Superadar Runner

on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

jobs:
  run-superadar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ENDERECO_LOJA: ${{ secrets.ENDERECO_LOJA || '' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ">=3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run backend entrypoint (with timeout and retry)
        shell: bash
        run: |
          set -o pipefail
          mkdir -p logs screenshots

          max_attempts=2
          timeout_seconds=900
          attempt=1

          until [ "$attempt" -gt "$max_attempts" ]; do
            log_file="logs/run-attempt-${attempt}.log"
            echo "Starting attempt ${attempt}/${max_attempts}"

            if timeout "${timeout_seconds}" python -m backend.app.main 2>&1 | tee "$log_file"; then
              echo "Execution succeeded on attempt ${attempt}."
              break
            fi

            echo "Attempt ${attempt} failed."
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "All retry attempts failed."
              exit 1
            fi

            attempt=$((attempt + 1))
            echo "Retrying in 10 seconds..."
            sleep 10
          done

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: superadar-debug-artifacts
          if-no-files-found: warn
          path: |
            logs/**
            screenshots/**
